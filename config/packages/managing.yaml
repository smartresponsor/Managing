managing:
  admin_enabled: true
  admin_route_prefix: '/manage'
  admin_allowed_environments: []
  admin_required_role: 'ROLE_ADMIN'
  admin_show_security_notes: true
  admin_logout_path: '/logout'
  admin_logout_label: 'Logout'
  enabled_components: []
  disabled_resources: []
  menu_order: []

  left_menu:
    - analysing
    - applicating
    - attaching
    - billing
    - cataloging
    - commissioning
    - currencing
    - exchanging
    - localizing
    - messaging
    - ordering
    - paging
    - paying
    - rolling
    - shipping
    - subscripting
    - tagging
    - taxating
    - vendoring
  menu_excluded_components:
    - managing
    - cruding
    - interfacing
  host_scan_enabled: true
  host_scan_source_roots: ['src']
  host_scan_namespace_prefixes:
    - 'App\'
  host_scan_excluded_namespaces:
    - 'App\Managing\'

  component_root_aliases:
    category: cataloging

  crud_behavior_search_fields: ['firstTitle', 'title', 'name', 'label', 'code', 'slug', 'sku', 'status', 'state']
  crud_behavior_status_fields: ['status', 'state']
  crud_behavior_publication_flag_fields: ['published', 'isPublished', 'enabled', 'active']
  crud_behavior_publication_date_fields: ['publishedAt', 'publishAt']
  crud_behavior_audit_date_fields: ['createdAt', 'updatedAt']
  crud_behavior_default_sort_fields: ['updatedAt', 'createdAt', 'publishedAt', 'id']

  crud_field_title_candidates: ['firstTitle', 'title', 'name', 'label']
  crud_field_identity_candidates: ['code', 'slug', 'sku']
  crud_field_email_keywords: ['email']
  crud_field_url_keywords: ['url', 'link']
  crud_field_long_text_keywords: ['description', 'summary', 'message', 'content', 'body', 'note', 'payload', 'details']
  crud_field_type_overrides: []
